<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" fill="none">
  <defs>
    <!-- Beautiful modern fintech gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer glowing ring accent -->
  <circle cx="64" cy="64" r="58" stroke="url(#shieldGrad)" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="6 4" />
  
  <!-- Main Shield Path -->
  <path d="M64 16 C84 16, 98 22, 98 22 C98 22, 98 62, 98 76 C98 94, 76 108, 64 112 C52 108, 30 94, 30 76 C30 62, 30 22, 30 22 C30 22, 44 16, 64 16 Z" 
        fill="url(#shieldGrad)" 
        filter="url(#glow)" />
        
  <!-- Inner Shield Cutout for depth -->
  <path d="M64 24 C79 24, 90 29, 90 29 C90 29, 90 60, 90 72 C90 86, 73 97, 64 101 C55 97, 38 86, 38 72 C38 60, 38 29, 38 29 C38 29, 49 24, 64 24 Z" 
        fill="#020617" />
        
  <!-- Sleek Verified Checkmark inside the shield -->
  <path d="M48 64 L58 74 L80 50" 
        stroke="url(#shieldGrad)" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>